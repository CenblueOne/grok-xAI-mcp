# Windows-MCP Recommended Config for Grok / Remote Use
# Save to ~/.windows-mcp/config.toml or use --config flag
# CLI flags override these values.

[server]
transport = "streamable-http"
host = "0.0.0.0"
port = 8000
auth_key = "CHANGE-THIS-TO-STRONG-SECRET-123!"   # REQUIRED for HTTP
# ssl_certfile = "cert.pem"
# ssl_keyfile = "key.pem"

[security]
ip_allowlist = ["127.0.0.1", "192.168.1.0/24"]   # Restrict to local/LAN. Add ngrok IP or use tunnel only.
cors_origins = ["*"]                             # Or restrict to your Grok client origin

[tools]
# exclude = ["PowerShell", "Registry"]           # Uncomment to disable dangerous tools (recommended for safety)
# Or whitelist only safe ones:
# tools = ["Click", "Type", "Screenshot", "Scroll", "Move", "App", "FileSystem", "Clipboard"]

[telemetry]
anonymized = false                               # Disable telemetry
